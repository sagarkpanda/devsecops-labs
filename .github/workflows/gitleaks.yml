name: Gitleaks

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Run Gitleaks (git history)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_UPLOAD_RESULTS: true

      - name: Run Gitleaks (full filesystem)
        if: always()
        run: |
          docker run --rm -v "$PWD:/path" ghcr.io/gitleaks/gitleaks:latest \
            dir /path --report-format sarif \
            --report-path /path/gitleaks-fs.sarif --exit-code 0

          docker run --rm -v "$PWD:/path" ghcr.io/gitleaks/gitleaks:latest \
            dir /path --report-format json \
            --report-path /path/gitleaks-fs.json --exit-code 0

      - name: Add filesystem scan summary
        if: always()
        run: |
          echo "## Gitleaks Filesystem Scan" >> "$GITHUB_STEP_SUMMARY"
          if [ -s gitleaks-fs.json ] && [ "$(cat gitleaks-fs.json)" != "[]" ]; then
            COUNT=$(jq length gitleaks-fs.json)
            echo "⚠️ Found **$COUNT** potential secret(s) in working tree files." >> "$GITHUB_STEP_SUMMARY"
            jq -r '.[] | "- `\(.File)` (rule: \(.RuleID))"' gitleaks-fs.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ No secrets found in filesystem scan." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload filesystem scan artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gitleaks-filesystem-results
          path: |
            gitleaks-fs.sarif
            gitleaks-fs.json
          retention-days: 30

      - name: Upload SARIF (filesystem)
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          sarif_file: gitleaks-fs.sarif
          category: gitleaks-fs

      - name: Upload Gitleaks to DefectDojo
        if: always()
        run: |
          RESPONSE=$(curl --fail --show-error --silent \
            -X POST \
            "${{ secrets.DEFECTDOJO_URL }}/api/v2/reimport-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -H "Accept: application/json" \
            -F "scan_type=SARIF" \
            -F "file=@gitleaks-fs.sarif" \
            -F "product_type_name=Research and Development" \
            -F "product_name=devsecops-labs" \
            -F "engagement_name=GitHub Actions Pipeline" \
            -F "test_title=Gitleaks Filesystem" \
            -F "close_old_findings=true" \
            -F "do_not_reactivate=false" \
            -F "environment=Development" \
            -F "build_id=${{ github.run_number }}" \
            -F "branch_tag=${{ github.ref_name }}" \
            -F "commit_hash=${{ github.sha }}" \
            -F "tags=github-actions,gitleaks,${{ github.ref_name }}")
          echo "$RESPONSE"
