name: Gitleaks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (git history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_UPLOAD_RESULTS: true

      - name: Run Gitleaks (full filesystem)
        if: always()
        run: |
          # Exclude gitleaks own output files to avoid false positives
          cat > gitleaks-config.toml << 'EOF'
          [allowlist]
            paths = [
              '''gitleaks-fs\.sarif''',
              '''gitleaks-results\.sarif''',
              '''gitleaks-config\.toml'''
            ]
          EOF

          docker run --rm -v "$PWD:/path" ghcr.io/gitleaks/gitleaks:latest \
            dir /path \
            --config /path/gitleaks-config.toml \
            --report-format sarif \
            --report-path /path/gitleaks-fs.sarif \
            --exit-code 0

      - name: Add filesystem scan summary
        if: always()
        run: |
          echo "## Gitleaks Filesystem Scan" >> "$GITHUB_STEP_SUMMARY"
          if [ -f gitleaks-fs.sarif ]; then
            COUNT=$(jq '[.runs[].results[]] | length' gitleaks-fs.sarif)
            if [ "$COUNT" -gt 0 ]; then
              echo "⚠️ Found **$COUNT** potential secret(s) in working tree files." >> "$GITHUB_STEP_SUMMARY"
              jq -r '.runs[].results[] | "- `\(.locations[0].physicalLocation.artifactLocation.uri)` (rule: \(.ruleId))"' \
                gitleaks-fs.sarif >> "$GITHUB_STEP_SUMMARY"
            else
              echo "✅ No secrets found in filesystem scan." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "❌ SARIF file not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload filesystem scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-filesystem-results
          path: gitleaks-fs.sarif
          retention-days: 30

      - name: Upload SARIF (filesystem)
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-fs.sarif
          category: gitleaks-fs
