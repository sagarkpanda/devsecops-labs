name: Semgrep

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: SAST Scan
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config auto \
            --sarif \
            --output semgrep.sarif \
            .

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      - name: Upload SARIF Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif

      - name: Upload to DefectDojo
        if: always()
        run: |
          ls -lah

          curl -v \
            -X POST \
            "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -H "Accept: application/json" \
            -F "scan_type=SARIF" \
            -F "file=@semgrep.sarif" \
            -F "product_type_name=Research and Development" \
            -F "product_name=devsecops-labs" \
            -F "engagement_name=GitHub Actions Pipeline" \
            -F "test_title=Semgrep" \
            -F "close_old_findings=false" \
            -F "do_not_reactivate=false" \
            -F "environment=Development" \
            -F "build_id=${{ github.run_number }}" \
            -F "branch_tag=${{ github.ref_name }}" \
            -F "commit_hash=${{ github.sha }}"