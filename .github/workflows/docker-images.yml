name: Build and Push Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          format: sarif
          output: trivy-fs.sarif
          exit-code: 0

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Set image variables
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "GITHUB_REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: docker compose build

      - name: Scan web-app image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.GITHUB_REPOSITORY_OWNER }}/web-app:latest
          format: sarif
          output: trivy-web-app.sarif
          scanners: vuln
          # severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Scan migration-app image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.GITHUB_REPOSITORY_OWNER }}/migration-app:latest
          format: sarif
          output: trivy-migration-app.sarif
          scanners: vuln
          # severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Upload web-app SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-web-app.sarif
          category: trivy-web-app

      - name: Upload migration-app SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-migration-app.sarif
          category: trivy-migration-app

      - name: Upload to DefectDojo
        if: always()
        run: |
          curl -X POST \
            "${{ secrets.DEFECTDOJO_URL }}/api/v2/reimport-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -H "Accept: application/json" \
            -F "scan_type=SARIF" \
            -F "file=@semgrep.sarif" \
            -F "product_type_name=Research and Development" \
            -F "product_name=devsecops-labs" \
            -F "engagement_name=GitHub Actions Pipeline" \
            -F "test_title=Semgrep" \
            -F "close_old_findings=false" \
            -F "do_not_reactivate=false" \
            -F "environment=Development" \
            -F "build_id=${{ github.run_number }}" \
            -F "branch_tag=${{ github.ref_name }}" \
            -F "commit_hash=${{ github.sha }}"

      - name: Tag images
        run: |
          docker tag \
            ghcr.io/${GITHUB_REPOSITORY_OWNER}/web-app:latest \
            ghcr.io/${GITHUB_REPOSITORY_OWNER}/web-app:${SHORT_SHA}

          docker tag \
            ghcr.io/${GITHUB_REPOSITORY_OWNER}/migration-app:latest \
            ghcr.io/${GITHUB_REPOSITORY_OWNER}/migration-app:${SHORT_SHA}

      - name: Push images
        run: |
          docker push ghcr.io/${GITHUB_REPOSITORY_OWNER}/web-app:latest
          docker push ghcr.io/${GITHUB_REPOSITORY_OWNER}/web-app:${SHORT_SHA}

          docker push ghcr.io/${GITHUB_REPOSITORY_OWNER}/migration-app:latest
          docker push ghcr.io/${GITHUB_REPOSITORY_OWNER}/migration-app:${SHORT_SHA}